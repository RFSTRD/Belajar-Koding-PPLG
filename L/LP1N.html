<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar dengan Flexbox</title>
    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #333;
            padding: 15px 20px;
            color: white;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
        }

        .nav-menu {
            display: flex;
            list-style: none;
        }

        .nav-menu li {
            margin: 0 15px;
        }

        .nav-menu a {
            text-decoration: none;
            color: white;
            font-size: 18px;
        }

        .nav-menu a:hover {
            color: orange;
        }

        .search-icon {
            cursor: pointer;
        }
        .search-icon img {
            width: 20px;
            height: 20px;
        }

        .menu-toggle {
            display: none;
            font-size: 24px;
            cursor: pointer;
        }

        @media screen and (max-width: 768px) {
            .nav-menu {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 60px;
                right: 0;
                background: #333;
                width: 100%;
                text-align: center;
                padding: 10px 0;
            }

            .nav-menu.active {
                display: flex;
            }

            .menu-toggle {
                display: block;
            }
        }
        .hamburger {
            position: absolute;
            left: 50%;
            right: 50%;
            cursor: pointer;
        }
        .hamburger img {
            width: 30px;
        }
        @media screen and (min-width: 768px) {
            .hamburger {
                display: none;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">LOGO</div>
        <ul class="nav-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Materi</a></li>
            <li><a href="#">Latihan</a></li>
            <li><a href="#">Kontak</a></li>
        </ul>
        <div class="hamburger">
            <img src="Menu-Logo.png" alt="menu">
        </div>
        <div class="search-icon">
            <img src="search-logo.png" alt="search">
        </div>
    </nav>

</body>
</html>
