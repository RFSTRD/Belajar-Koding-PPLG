<!DOCTYPE html>
<html>
<head>
  <title>Button Frame 2</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
    button {
      background: linear-gradient(to right, darkmagenta, magenta);
      outline: none;
      border: none;
      padding: 10px;
      border-radius: 100vh;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body style="text-align: center; background: linear-gradient(to top, darkmagenta, magenta); height: 90vh; color: white;">
  <h2>Frame Bawah</h2>
  <button onclick="window.location.href='https://www.instagram.com'"><i class="fab fa-instagram"></i>Instagram</button>
</body>
</html>
