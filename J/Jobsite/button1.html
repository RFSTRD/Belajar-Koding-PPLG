<!DOCTYPE html>
<html>
<head>
  <title>Button Frame 1</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
  <style>
    button {
      background: linear-gradient(to right, hsl(120, 100%, 30%), hsl(120, 100%, 35%));
      outline: none;
      border: none;
      padding: 10px;
      border-radius: 100vh;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body style="text-align: center; background: linear-gradient(to bottom, darkgreen, green); height: 90vh; color: white;">
  <h2>Frame Atas</h2>
  <button onclick="window.location.href='https://www.wikipedia.org'"><i class="fa fa-shopping-bag"></i> Wikipedia</button>
</body>
</html>
