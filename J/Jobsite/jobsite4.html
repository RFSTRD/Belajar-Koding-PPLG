<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   Gallery
  </title>
  <script src="https://cdn.tailwindcss.com">
  </script>
 </head>
 <body class="bg-white">
  <div class="max-w-screen-lg mx-auto">
   <div class="flex flex-wrap">
    <div class="w-full md:w-8/12 relative">
     <img alt="Clothes on racks in store interior with various colors and styles" class="w-full h-auto object-cover" height="150" src="https://storage.googleapis.com/a1aa/image/87f8f091-082a-4f48-4ee5-dd33a035a5ba.jpg" width="800"/>
     <div class="absolute top-1/2 right-0 -translate-y-1/2 bg-yellow-600 text-white font-bold text-lg px-4 py-1">
      DISCOUNT 50%
     </div>
    </div>
    <div class="w-full md:w-4/12 relative">
     <img alt="Close up of wooden clothes hangers with shirts in store" class="w-full h-auto object-cover" height="150" src="https://storage.googleapis.com/a1aa/image/f9a929d0-8dfa-4e72-a578-da8c99b1e2f8.jpg" width="400"/>

      Only 180K all size
     </div>
    </div>
   </div>
   <div class="border border-gray-300 px-2 py-1 text-sm text-blue-700 font-semibold">
    HOME
   </div>
   <div class="grid grid-cols-3 border border-gray-300 border-t-0">
    <div class="border border-gray-300 p-1">
     <img alt="Red T-shirt front view on white background" class="w-full h-auto" height="200" src="https://storage.googleapis.com/a1aa/image/ac60920e-2f20-446b-df54-7641b4d4262e.jpg" width="200"/>
    </div>
    <div class="border border-gray-300 p-1">
     <img alt="Light green T-shirt front view on white background" class="w-full h-auto" height="200" src="https://storage.googleapis.com/a1aa/image/860db887-b208-48b8-f568-9f89c09c821d.jpg" width="200"/>
    </div>
    <div class="border border-gray-300 p-1">
     <img alt="Gray T-shirt front view on white background" class="w-full h-auto" height="200" src="https://storage.googleapis.com/a1aa/image/43d8bcea-b406-4741-2185-82ab3f4da7d2.jpg" width="200"/>
    </div>
    <div class="border border-gray-300 p-1">
     <img alt="Red T-shirt back view on white background" class="w-full h-auto" height="200" src="https://storage.googleapis.com/a1aa/image/22bfd036-2644-4d78-2748-4e765c9e9bae.jpg" width="200"/>
    </div>
    <div class="border border-gray-300 p-1">
     <img alt="White T-shirt with black collar front view on white background" class="w-full h-auto" height="200" src="https://storage.googleapis.com/a1aa/image/de39cbd1-3300-4500-048d-6c1f574f302b.jpg" width="200"/>
    </div>
    <div class="border border-gray-300 p-1">
     <img alt="Black T-shirt front view on white background" class="w-full h-auto" height="200" src="https://storage.googleapis.com/a1aa/image/2fef860e-bf54-4ab8-d308-cd624c7adb58.jpg" width="200"/>
    </div>
   </div>
  </div>

</html>
