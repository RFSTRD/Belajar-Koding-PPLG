<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Sekolah</title>
    <style>
        body {
            font-family: arial;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
            background-color: white;
            height: 100vh;
            color: white;
        }
        header {
            background: linear-gradient(to right, darkblue, blue);
            width: 100vw;
            text-align: center;
        }
        nav {
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            background: linear-gradient(to right, hsl(240, 100%, 17%), hsl(240, 100%, 40%));
            width: 100vw;
            text-align: center;
        }
        nav p {
            font-weight: bold;
        }
        nav p:hover {
            text-shadow: 1px 1px 10px;
        }
        main {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 65vh;
            width: 100vw;
        }
        .container {
            flex-wrap: wrap;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .box {
            text-align: center;
            margin: 1px;
            padding: 10%;
            background: linear-gradient(to bottom right, darkblue, blue);
            cursor: pointer;
            transition: padding 0.5s ease;
            border-radius: 10px;

        }
        .box:hover {
            box-shadow: 1px 1px 10px blue;
            padding: 11%;
            transition: padding 0.5s ease;
        }
        footer {
            position: fixed;
            bottom: 0;
            background-color: darkblue;
            width: 100vw;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>
<body>
    <header><h2>SMK Hebat</h2></header>
    <nav>
        <p>Home</p>
        <p>Profil</p>
        <p>Kontak</p>
    </nav>
    <main class="container">
        <section class="box">konten 1</section>
        <section class="box">konten 2</section>
        <section class="box">konten 3</section>
    </main>
    <footer>&copy;2026</footer>
</body>
</html>
