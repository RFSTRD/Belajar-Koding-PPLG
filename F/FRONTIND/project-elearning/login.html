<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - E-Learning</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        background: linear-gradient(135deg, #1e3a8a, #3b82f6);
      }
      .login-card {
        backdrop-filter: blur(16px);
        background: rgba(255, 255, 255, 0.15);
        border: 1px solid rgba(255, 255, 255, 0.3);
        transition: all 0.3s ease;
      }
      .login-card:hover {
        transform: scale(1.02);
        box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.3);
      }
      input {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        backdrop-filter: blur(4px);
        transition: all 0.2s;
      }
      input:focus {
        background: rgba(255, 255, 255, 0.3);
        outline: none;
        transform: scale(1.02);
      }
    </style>
  </head>

  <body class="flex items-center justify-center min-h-screen p-4">
    <div
      class="login-card rounded-2xl p-8 w-full max-w-md shadow-2xl text-white"
    >
      <h2 class="text-3xl font-bold mb-6 text-center">Masuk ke Akun</h2>

      <input
        id="username"
        placeholder="Username"
        class="w-full p-3 mb-4 rounded-xl text-white"
        style="background: linear-gradient(135deg, #1e3a8a, #3b82f6)"
      />
      <input
        id="password"
        type="password"
        placeholder="Password"
        class="w-full p-3 mb-6 rounded-xl text-white"
        style="background: linear-gradient(135deg, #1e3a8a, #3b82f6)"
      />

      <button
        onclick="login()"
        class="bg-white text-blue-800 font-bold w-full py-3 rounded-xl hover:bg-blue-100 transition transform hover:scale-105 shadow-md"
      >
        Masuk
      </button>

      <p id="error" class="text-sm mt-4 text-center"></p>
    </div>

    <script>
      function login() {
        let user = document.getElementById("username").value;
        let pass = document.getElementById("password").value;

        if (user === "rafi" && pass === "1122") {
          localStorage.setItem("login", "true");
          localStorage.setItem("user", user);
          window.location.href = "index.html";
        } else {
          document.getElementById("error").innerText =
            " Login gagal! Periksa username/password.";
        }
      }
    </script>
  </body>
</html>
