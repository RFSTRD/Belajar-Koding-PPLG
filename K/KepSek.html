<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KepSek</title>
    <style>
        body {
            flex-wrap: 0;
        }
        .container {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            margin-bottom: 10px;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }
        .box {
            background-color: blue;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-family: arial;
        }
        .box2 {
            background-color: white;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-family: arial;
        }
        .box1 {
            background-color: red;
            width: 200px;
            height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-family: arial;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box">1</div>
        <div class="box">2</div>
        <div class="box">3</div>
    </div>
    <div class="container">
        <div class="box1">4</div>
        <div class="box1">5</div>
        <div class="box1">6</div>
    </div>
    <div class="container">
        <div class="box">7</div>
        <div class="box2">ad</div>
        <div class="box">8</div>
    </div>
    <div class="container">
        <div class="box2">ad</div>
        <div class="box1">9</div>
        <div class="box2">ad</div>
    </div>
</body>
</html>
