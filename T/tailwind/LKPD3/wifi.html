<html lang="en">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   Login Page
  </title>
  <link rel="shortcut icon" href="https://epjj.smkn2-bjm.sch.id/pluginfile.php/1/core_admin/logocompact/300x300/1757318902/SMK2.png" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com">
  </script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" rel="stylesheet"/>
 </head>
 <body>
  <div class="min-h-screen flex flex-col items-center justify-center" style="background: radial-gradient(circle at top right, #e6e6d9, #4f6a75, #2f3e50)">
   <div class="flex space-x-6 mb-4">
    <img alt="School logo with red background and yellow border, featuring a building and star emblem" class="w-20 h-[110px] object-contain" height="110" src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a6/Coat_of_arms_of_South_Kalimantan.svg/500px-Coat_of_arms_of_South_Kalimantan.svg.png" width="80"/>
    <img alt="School logo with white background and red border, featuring a green leaf and orange emblem" class="w-20 h-[110px] object-contain" height="110" src="https://epjj.smkn2-bjm.sch.id/pluginfile.php/1/core_admin/logocompact/300x300/1757318902/SMK2.png" width="80"/>
   </div>
   <p class=" text-center text-black">
    Please log in to use the internet hotspot skenda
   </p>
   <form class="w-full max-w-md px-2">
    <div class="mb-4">
     <div class="flex items-center bg-gray-200 rounded-md px-4 py-3 text-gray-600 text-lg">
      <i class="fas fa-user mr-3">
      </i>
      <input class="bg-gray-200 w-full outline-none text-base placeholder-gray-500" placeholder="Username" type="text"/>
     </div>
    </div>
    <div class="mb-6">
     <div class="flex items-center bg-gray-200 rounded-md px-4 py-3 text-gray-600 text-lg">
      <i class="fas fa-key mr-3">
      </i>
      <input class="bg-gray-200 w-full outline-none text-base placeholder-gray-500" placeholder="Password" type="password"/>
     </div>
    </div>
    <button class="w-full bg-gray-700 text-white py-3 rounded-md text-lg font-semibold" type="submit">
     Connect
    </button>
   </form>
   <p class="text-center text-gray-400 font-semibold text-sm">
    Gunakan internet dengan bijak !!!
   </p>
  </div>
 </body>
</html>
