<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Typography Tailwind</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 p-6">
    <div class="max-w-2xl mx-auto bg-white p-6 rounded-lg shadow">
        <h1 class="text-3xl font-bold text-gray-800 mb-2">Belajar Typography di
            Tailwind
        </h1>
        <p class="text-gray-700 text-base leading-relaxed">
            Dengan menggunakan <span class="font-semibold">utility class</span> dari TailwindCSS, kita dapat mengatur tampilan teks seperti ukuran, warna, dan spasi dengan mudah dan cepat.
        </p>
        <p class="text-blue-600 font-medium mt-4 underline hover:text-blue-800 transition">
            Ini adalah contoh teks dengan efek hover dan underline.
        </p>
        <p class="text-sm text-gray-500 mt-6 uppercase tracking-wide">
            teks kecil dengan huruf kapital dan spasi huruf lebar www
        </p>
    </div>
</body>
</html>
