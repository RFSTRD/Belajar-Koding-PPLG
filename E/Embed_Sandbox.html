<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframe with Sandbox</title>
</head>
<body>
    <h1>Iframe with Sandbox</h1>
    <iframe 
        src="https://example.com" 
        width="600" 
        height="450" 
        frameborder="0" 
        sandbox="allow-same-origin allow-top-navigation">
    </iframe>
    <p>Konten eksternal dari example.com</p>
</body>
</html>
