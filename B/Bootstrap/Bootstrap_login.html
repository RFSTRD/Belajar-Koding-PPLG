<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Media Belajar</title>
    <style>
      /* Full-screen gradient background */
      body,
      html {
        height: 100%;
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(to bottom right, darkgreen, green);
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* Login box styling */
      .login-box {
        background: #fff;
        padding: 2rem 2.5rem;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        width: 50vw;
        box-sizing: border-box;
        text-align: center;
      }

      .login-box h1 {
        margin-bottom: 1.5rem;
        color: hsl(120, 100%, 10%);
      }

      label {
        display: block;
        text-align: left;
        margin-bottom: 0.25rem;
        font-size: 0.9rem;
        color: #555;
      }

      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 0.5rem 0.75rem;
        margin-bottom: 1rem;
        border: 1px solid #ccc;
        border-radius: 5px;
        font-size: 1rem;
        box-sizing: border-box;
        transition: border-color 0.2s;
      }

      input[type="email"]:focus,
      input[type="password"]:focus {
        border-color: black;
        outline: none;
      }

      button {
        width: 100%;
        padding: 0.6rem 0;
        background-color: darkgreen;
        border: none;
        border-radius: 5px;
        font-size: 1rem;
        color: white;
        cursor: pointer;
        transition: background-color 0.3s;
        margin-top: 10px;
      }

      button:hover {
        background-color: hsl(120, 100%, 10%);
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      <h1>Login LMS</h1>
      <form onsubmit="return validateLogin(event);">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Masukkan email" required />

        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          placeholder="Masukkan password"
          required
        />
        <button type="submit">Login</button>
      </form>
    </div>
    <script>
      function validateLogin(event) {
        event.preventDefault(); // stop form from reloading the page

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (email && password) {
          // ✅ If fields are filled, redirect to dashboard
          window.location.href = "bootstrap3.html";
        } else {
          //  If something’s missing, show alert
          alert("Email dan Password wajib diisi!");
        }
      }
    </script>
  </body>
</html>
