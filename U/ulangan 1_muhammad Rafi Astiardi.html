<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ulangan 1</title>
    <style>
        body {
            font-family: arial;
            margin: 0px;
            padding: 0px;
        }
        header {
            background-color: red;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0px 35% 0 0;
        }
        .judul {
            padding: 1px;
            color: white;
            text-align: center;
        }
        .iconsmk img {
            width: 30%;
            margin: 10px;
        }
        .navbar {
            display: flex;
            justify-content: space-evenly;
            align-items: flex-start;
            background-color: black;
        }
        .navbar p {
            background-color: darkred;
            color: white;
            padding: 10px;
            border-radius: 10px;
            width: 10%;
            text-align: center;
            cursor: pointer;
        }
        .navbar p:hover {
            background-color: red;
            width: 11%;
        }
        .konten {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .konten h3 {
            cursor: pointer;
            background-color: gray;
            color: white;
            padding: 5%;
            margin: 10px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }
        .konten h3:hover {
            background-color: black;
            
        }
        footer {
            padding: 1px;
            margin-top: 110px;
            background-color: black;
            color: white;
            text-align: center;
        }
        footer a {
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <div class="iconsmk"><img src="SMK2.png" alt="smkn2"></div>
        <div class="judul"><h1>Penjual Baju tradisional</h1></div>
    </header>
    <div class="navbar">
        <p>Home</p>
        <p>Menu</p>
        <p>Kontak</p>
        <p>Profil</p>
    </div>
    <div class="konten">
        <h3>Murah</h3>
        <h3>Tahan lama</h3>
    </div>
    <div class="konten">
        <h3>high Quality</h3>
        <h3>Dekat</h3>
    </div>
    <footer>
        <p>WhatsApp: +62 878-7963-2570</p>
        <p>Instagram: <a href="https://www.instagram.com/rafi.astiardi?igsh=YzljYTk1ODg3Zg==">rafi.astiardi</a></p>
    </footer>
</body>
</html>
