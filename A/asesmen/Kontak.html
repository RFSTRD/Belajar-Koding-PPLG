<!DOCTYPE html>

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            font-family: "Poppins", sans-serif;
            background-color: white;
            opacity: 0;
            transition: opacity 3600s ease;
        }
        body:hover {
            opacity: 1;
            transition: opacity 1s linear;
        }
        nav {
            background: linear-gradient(to right, darkblue, blue);
            box-shadow: 0 3px 5px rgba(0, 0, 0, 0.2);
        }
        nav ul {
            width: 100%;
            list-style: none;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }
        nav li {
            height: 50px;
        }
        nav a {
            height: 100%;
            padding: 0 10px;
            text-decoration: none;
            color: white;
            display: flex;
            align-items: center;
            border-radius: 5px;
        }
        nav a:hover {
            background-color: darkblue;
        }
        nav li:first-child {
            margin-right: auto;
        }
        nav i:first-child {
            margin-inline: 5px;
        }
        nav li:nth-child(2) {
            display: none;
        }
        @media screen and (max-width:691px) {
            nav ul {
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }
            nav li:not(:first-child):not(:nth-child(2)) {
                width: 100%;
                opacity: 0;
                max-height: 0;
                overflow: hidden;
            }
            nav li:nth-child(2) {
                display: block;
                right: 0;
                top: 0;
                position: fixed;
                background: transparent;
                backdrop-filter: blur(10px);
                border: 2px solid rgba(0, 0, 0, 0.2);
                border-radius: 10px;
                height: 45px;
            }
            nav li:not(:first-child):not(:nth-child(2)).show {
                opacity: 1;
                max-height: inherit;
            }
            nav a:active {
                background-color: blue;
            }
        }
        .content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(to top right, darkblue, blue);
            color: white;
            border-radius: 10px;
            font-size: larger;
            width: fit-content;
            margin: 7.5% auto;
            padding: 5%;
        }
        .content h3 {
            margin-bottom: 1%;
        }
        .content ul {
            list-style: none;
        }
        .content a {
            color: white;
            text-decoration: none;
        }
        .content i {
            margin-inline: 5px;
        }
        footer {
            background: linear-gradient(to top, darkblue, transparent);
            color: white;
            position: fixed;
            bottom: 0;
            padding: 1%;
            width: 100%;
            text-align: center;
        }
        footer p {
            font-style: oblique;
        }
    </style>
</head>
<body>

        const menuItems = document.querySelectorAll('nav li:not(:first-child):not(:nth-child(2))');
