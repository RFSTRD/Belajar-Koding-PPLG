<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Pembelajaran IPA - Tata Surya</title>
  <style>/* style didalam head */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      background-color: #f0f8ff;
      color: #333;
    }
    header {
      background-color: #006699;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .logo {
      font-size: 24px;
      font-weight: bold;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
    }
    nav li a {
      color: white;
      text-decoration: none;
      font-weight: bold;
      padding: 5px 10px;
      border-radius: 5px;
    }
    nav li a:hover {
      background-color: #004466;
    }
    main {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
      margin: 20px;
    }
    .sidebar {
      background-color: #dff0ff;
      padding: 15px;
      border-radius: 8px;
    }
    .konten-main {/* nama class sama dengan yang di html */
      background-color: #ffffff;
      padding: 15px;
      border-radius: 8px;
    }
    .konten-main img {
      max-width: 100%;
      border-radius: 8px;
      text-align: center;
    }
    .judul-bab {
      font-size: 20px;
      margin-bottom: 10px;
      text-align: center; /* text-aling */
    }
    footer {
      text-align: center;
      background: #ccc;
      padding: 15px;
      margin-top: 20px;
    }
  </style>
</head>
<body><!-- body hanya satu -->
  <header>
    <div class="logo">IPA Kelas 7</div>
    <nav>
      <ul>
        <li><a href="#">Beranda</a></li>
        <li><a href="#">Materi</a></li>
        <li><a href="#">Latihan</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <section class="sidebar">
      <h2>Daftar Topik</h2>
      <ul>
        <li>Tata Surya</li>
        <li>Planet dan Satelit</li>
        <li>Rotasi & Revolusi</li>
      </ul>
    </section>
    <section class="konten-main">
      <h2 class="judul-bab">Bab: Tata Surya</h2>
      <img src="../img/tata-surya.png" alt="Ilustrasi Tata Surya">
      <p>
        Tata surya terdiri atas matahari sebagai pusatnya dan planet-planet yang mengelilinginya...
      </p>
    </section>
  </main>
  <footer>
    &copy; 2025 Media Pembelajaran IPA - SMK Negeri 2 Banjarmasin
  </footer>
</body>
</html>
