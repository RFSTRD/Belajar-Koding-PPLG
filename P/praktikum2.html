<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kartu Produk</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f9f9f9;
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }
        .product-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }
        .product-name {
            margin: 10px 0;
            font-size: 18px;
        }
        .buy-button {
            padding: 10px 15px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .buy-button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://i.ytimg.com/vi/kPj_IeH6ZZE/maxresdefault.jpg" alt="Produk" class="product-image">
        <h2 class="product-name">Nama Produk</h2>
        <button class="buy-button">Beli Sekarang</button>
    </div>
</body>
</html>
