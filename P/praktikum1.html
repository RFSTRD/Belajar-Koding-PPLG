<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Layout Dua Kolom</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .container {
            display: flex;
            height: 100vh;
        }
        .sidebar {
            flex: 1;
            background-color: #f4f4f4;
            padding: 20px;
            text-align: center;
        }
        .content {
            flex: 3;
            background-color: #fff;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <aside class="sidebar">Sidebar</aside>
        <main class="content">Konten Utama</main>
    </div>
</body>
</html>
