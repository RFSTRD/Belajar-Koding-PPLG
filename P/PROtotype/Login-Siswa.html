<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Siswa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-tabs">
            <button class="active">Siswa</button>
            <button onclick="window.location.href='login-guru.html'">Guru</button>
        </div>

        <h2>Login Siswa</h2>
        <form action="dashboard-siswa.html" method="post">
            <label for="nis">NIS</label>
            <input type="text" id="nis" name="nis" placeholder="Masukkan NIS" required>

            <label for="password">Kata Sandi</label>
            <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required>

            <button type="submit">Masuk</button>
        </form>
    </div>
</body>
</html>
